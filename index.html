    SKILLS.forEach(skill => {

function filterSkills() {
    const search = document.getElementById('skillSearch').value.toLowerCase();

        item.style.display = item.textContent.toLowerCase().includes(search) ? 'block' : 'none';

// ==================== 发送消息（已修复API格式）====================
async function sendMessage() {
    const input = document.getElementById('userInput');
    const message = input.value.trim();
    if (!message) return;

    input.value = '';
    addMessage('user', message);
    
    const typingId = addTypingIndicator();

    try {
        console.log('Sending request to:', XUNFEI_CONFIG.BASE_URL);
        
        const response = await fetch(XUNFEI_CONFIG.BASE_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${XUNFEI_CONFIG.API_KEY}`
            },
            body: JSON.stringify({
                model: XUNFEI_CONFIG.MODEL,
                messages: [
                    { role: 'system', content: '你是一个友好的AI助手，名叫AiAmigo。请用用户使用的语言回答。' },
                    { role: 'user', content: message }
                ],
                temperature: 0.7,
                max_tokens: 800
            })
        });

        if (!response.ok) {
            const errorText = await response.text();
            console.error('API Error Response:', errorText);
            throw new Error(`HTTP ${response.status}: ${errorText}`);
        }
        
        const data = await response.json();
        console.log('API Response:', data);
        
        const reply = data.choices?.[0]?.message?.content || '抱歉，我暂时无法回答。';
        
        removeTypingIndicator(typingId);
        addMessage('bot', reply);
        
    } catch (error) {
        console.error('API Error:', error);
        removeTypingIndicator(typingId);
        const t = TRANSLATIONS[currentLang] || TRANSLATIONS.zh;
        addMessage('bot', `😅 ${t.thinking === 'AiAmigo está pensando...' ? 'Error de conexión. Por favor intenta de nuevo.' : '连接出错了，请稍后重试。'}`);
    }
}

function addMessage(role, content) {
    const container = document.getElementById('chatContainer');
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${role === 'user' ? 'user-message' : 'bot-message'}`;
    const contentDiv = document.createElement('div');
    contentDiv.className = 'message-content';
    contentDiv.innerHTML = content.replace(/\n/g, '<br>');
    msgDiv.appendChild(contentDiv);
    container.appendChild(msgDiv);
    container.scrollTop = container.scrollHeight;
}

function addTypingIndicator() {
    const container = document.getElementById('chatContainer');
    const typingDiv = document.createElement('div');
    typingDiv.className = 'message bot-message typing';
    typingDiv.id = 'typing-' + Date.now();
    const contentDiv = document.createElement('div');
    contentDiv.className = 'message-content';
    contentDiv.textContent = TRANSLATIONS[currentLang]?.thinking || 'AiAmigo 正在思考...';
    typingDiv.appendChild(contentDiv);
    container.appendChild(typingDiv);
    container.scrollTop = container.scrollHeight;
    return typingDiv.id;
}

function removeTypingIndicator(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
}

    document.getElementById('welcomeMessage').innerHTML = t.welcome.replace(/\n/g, '<br>');
    document.getElementById('userInput').placeholder = t.inputPlaceholder;
    document.getElementById('learningIndicator').textContent = t.learningIndicator;
    document.getElementById('footerText').textContent = t.footerText;
    document.getElementById('userName').textContent = t.userName;
    document.getElementById('skillSearch').placeholder = t.skillSearch;
    
    // 更新技能分类按钮文字
    const catButtons = document.querySelectorAll('.skill-cat');
    catButtons.forEach(btn => {
        const cat = btn.dataset.cat;
        btn.textContent = t.categories[cat];
    });
}

// ==================== IP检测 ====================
async function detectUserLocation() {
    try {
        const response = await fetch('https://ipapi.co/json/');
        const data = await response.json();
        const t = TRANSLATIONS[currentLang] || TRANSLATIONS.zh;
        const locationText = data.country_code === 'CN' ? '🇨🇳 ' + data.country_name : '📍 ' + data.country_name;
        document.getElementById('ipLocation').textContent = locationText;
        
        // 根据IP自动切换语言（中国IP用中文，其他用英文）
        if (data.country_code === 'CN') {
            changeLanguage('zh');
            document.getElementById('languageSelect').value = 'zh';
        } else {
            changeLanguage('en');
            document.getElementById('languageSelect').value = 'en';
        }
    } catch (error) {
        const t = TRANSLATIONS[currentLang] || TRANSLATIONS.zh;
        document.getElementById('ipLocation').textContent = '📍 ' + t.ipDetecting;
    }
}

// ==================== 初始化 ====================
document.addEventListener('DOMContentLoaded', function() {
    loadSkills();
    detectUserLocation();
});

document.getElementById('userInput')?.addEventListener('keypress', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

document.querySelectorAll('.skill-cat').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.skill-cat').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
        const cat = this.dataset.cat;
        document.querySelectorAll('.skill-item').forEach(item => {
            item.style.display = cat === 'all' || item.dataset.cat === cat ? 'block' : 'none';
        });
    });
});
</script>
