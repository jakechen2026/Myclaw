function loadSkills() {
    const grid = document.getElementById('skillsGrid');
    grid.innerHTML = '';
    SKILLS.forEach(skill => {
        const el = document.createElement('div');
        el.className = 'skill-item';
        el.setAttribute('data-cat', skill.cat);
        el.innerHTML = `<div class="skill-icon">${skill.icon}</div><div class="skill-name">${skill.name}</div><div class="skill-desc">${skill.desc}</div><div class="skill-badge">${skill.badge}</div>`;
        grid.appendChild(el);
    });
}

function filterSkills() {
    const search = document.getElementById('skillSearch').value.toLowerCase();
    document.querySelectorAll('.skill-item').forEach(item => {
        item.style.display = item.textContent.toLowerCase().includes(search) ? 'block' : 'none';
    });
}

// ==================== 发送消息（已修正 /v2）====================
async function sendMessage() {
    const input = document.getElementById('userInput');
    const message = input.value.trim();
    if (!message) return;

    input.value = '';
    addMessage('user', message);
    
    const typingId = addTypingIndicator();

    try {
        const response = await fetch(XUNFEI_CONFIG.BASE_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${XUNFEI_CONFIG.API_KEY}`
            },
            body: JSON.stringify({
                model: XUNFEI_CONFIG.MODEL,
                messages: [
                    { role: 'system', content: '你是一个友好的AI助手，名叫AiAmigo。' },
                    { role: 'user', content: message }
                ],
                temperature: 0.7,
                max_tokens: 800
            })
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const data = await response.json();
        const reply = data.choices?.[0]?.message?.content || '抱歉，我暂时无法回答。';
        
        removeTypingIndicator(typingId);
        addMessage('bot', reply);
        
    } catch (error) {
        console.error('API Error:', error);
        removeTypingIndicator(typingId);
        addMessage('bot', '😅 连接出错了，请稍后重试。错误：' + error.message);
    }
}

function addMessage(role, content) {
    const container = document.getElementById('chatContainer');
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${role === 'user' ? 'user-message' : 'bot-message'}`;
    const contentDiv = document.createElement('div');
    contentDiv.className = 'message-content';
    contentDiv.innerHTML = content.replace(/\n/g, '<br>');
    msgDiv.appendChild(contentDiv);
    container.appendChild(msgDiv);
    container.scrollTop = container.scrollHeight;
}

function addTypingIndicator() {
    const container = document.getElementById('chatContainer');
    const typingDiv = document.createElement('div');
    typingDiv.className = 'message bot-message typing';
    typingDiv.id = 'typing-' + Date.now();
    const contentDiv = document.createElement('div');
    contentDiv.className = 'message-content';
    contentDiv.textContent = TRANSLATIONS[currentLang]?.thinking || 'AiAmigo 正在思考...';
    typingDiv.appendChild(contentDiv);
    container.appendChild(typingDiv);
    container.scrollTop = container.scrollHeight;
    return typingDiv.id;
}

function removeTypingIndicator(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
}

    document.getElementById('welcomeMessage').innerHTML = t.welcome.replace(/\n/g, '<br>');
    document.getElementById('userInput').placeholder = t.inputPlaceholder;
    document.getElementById('learningIndicator').textContent = t.learningIndicator;
    document.getElementById('footerText').textContent = t.footerText;
}

        const locationText = data.country_code === 'CN' ? t.ipChina : t.ipGlobal.replace('{country}', data.country_name || '');
        document.getElementById('ipLocation').textContent = locationText;
        changeLanguage(data.country_code === 'CN' ? 'zh' : 'en');
    } catch (error) {
        document.getElementById('ipLocation').textContent = '📍 位置检测失败';
    }
}

// ==================== 初始化 ====================
document.addEventListener('DOMContentLoaded', function() {
    loadSkills();
    detectUserLocation();
    changeLanguage('zh');
});

document.getElementById('userInput')?.addEventListener('keypress', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

document.querySelectorAll('.skill-cat').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.skill-cat').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
        const cat = this.dataset.cat;
        document.querySelectorAll('.skill-item').forEach(item => {
            item.style.display = cat === 'all' || item.dataset.cat === cat ? 'block' : 'none';
        });
    });
});
</script>
</body>
</html>
